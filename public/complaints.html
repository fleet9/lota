<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File a Complaint - L.O.T.A</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg, #0f1f2e 0%, #0d2137 40%, #0a1f1a 100%); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #e2e8f0; display:flex; align-items:center; justify-content:center; padding:1.5rem; position:relative; overflow-x:hidden; }
body::before { content:''; position:absolute; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(0,210,180,0.06) 0%,transparent 70%); top:-200px; right:-200px; pointer-events:none; }
.wrap { width:100%; max-width:520px; position:relative; z-index:1; }
.card { background: rgba(255,255,255,0.05); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border: 1px solid rgba(0,210,180,0.15); border-radius: 24px; padding: 2.5rem; box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.08) inset; }
.logo { width:64px; height:64px; background:linear-gradient(135deg,#00d4b4,#00a896); border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; box-shadow:0 8px 24px rgba(0,212,180,0.4); }
h1 { font-size:1.4rem; font-weight:900; color:#00d4b4; letter-spacing:1px; text-align:center; text-shadow:0 0 30px rgba(0,212,180,0.4); }
.sub { color:rgba(255,255,255,0.4); font-size:0.85rem; text-align:center; margin-top:0.4rem; margin-bottom:1.75rem; }
label { color:rgba(0,212,180,0.8); font-size:0.75rem; font-weight:700; display:block; margin-bottom:0.35rem; text-transform:uppercase; letter-spacing:0.06em; }
input, select, textarea { background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(0,210,180,0.03)); border: 1px solid rgba(0,210,180,0.15); border-radius: 10px; color: #e2e8f0; padding: 0.7rem 0.9rem; width: 100%; font-size: 0.9rem; outline: none; transition: all 0.2s; box-shadow: inset 0 2px 8px rgba(0,0,0,0.2); backdrop-filter: blur(8px); }
input:focus, select:focus, textarea:focus { border-color: rgba(0,212,180,0.5); background: rgba(0,210,180,0.06); box-shadow: inset 0 2px 8px rgba(0,0,0,0.2), 0 0 0 3px rgba(0,212,180,0.1); }
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
select option { background:#0d2137; color:#e2e8f0; }
.field { margin-bottom:1.1rem; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.btn-primary { background: linear-gradient(135deg, #00d4b4, #00a896); border: none; color: #0a1f1a; font-weight: 700; cursor: pointer; border-radius: 10px; padding: 0.85rem 1.25rem; font-size:1rem; width:100%; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,212,180,0.3); }
.btn-primary:hover { background: linear-gradient(135deg, #00e8c8, #00baa8); box-shadow: 0 6px 20px rgba(0,212,180,0.45); transform: translateY(-1px); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.success { text-align:center; padding:1rem 0; }
.success i { font-size:3rem; color:#00d4b4; margin-bottom:1rem; }
.success h2 { font-size:1.2rem; font-weight:800; margin-bottom:0.5rem; }
.success p { color:rgba(255,255,255,0.5); font-size:0.875rem; }
.error-msg { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); color:#f87171; padding:0.7rem 1rem; border-radius:10px; font-size:0.85rem; margin-bottom:1rem; display:none; }
.foot { text-align:center; color:rgba(255,255,255,0.2); font-size:0.75rem; margin-top:1.5rem; }
</style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div id="formView">
            <div class="logo"><i class="fas fa-comment-dots" style="color:white;font-size:1.4rem;"></i></div>
            <h1>File a Complaint</h1>
            <p class="sub">L.O.T.A &mdash; Local Operations Taxi Association</p>
            <div id="errorMsg" class="error-msg"></div>
            <div class="field"><label>Your Name (optional)</label><input id="cName" placeholder="Full name"></div>
            <div class="field"><label>Phone Number *</label><input id="cPhone" placeholder="For follow-up" type="tel"></div>
            <div class="row2">
                <div class="field"><label>Complaint Type *</label><select id="cType">
                    <option value="driver_conduct">Driver Conduct</option>
                    <option value="overcharging">Overcharging</option>
                    <option value="vehicle_condition">Vehicle Condition</option>
                    <option value="reckless_driving">Reckless Driving</option>
                    <option value="route_deviation">Route Deviation</option>
                    <option value="other">Other</option>
                </select></div>
                <div class="field"><label>Date *</label><input id="cDate" type="date"></div>
            </div>
            <div class="field"><label>Route (e.g. Soweto to JHB CBD)</label><input id="cRoute" placeholder="Where it happened"></div>
            <div class="field"><label>Vehicle Plate / Description</label><input id="cVehicle" placeholder="Plate number or vehicle description (if known)"></div>
            <div class="field"><label>What Happened? *</label><textarea id="cDescription" placeholder="Describe the complaint in detail..." style="height:100px;resize:vertical;"></textarea></div>
            <button onclick="submitComplaint()" id="submitBtn" class="btn-primary"><i class="fas fa-paper-plane"></i> Submit Complaint</button>
        </div>
        <div id="successView" style="display:none;" class="success">
            <i class="fas fa-check-circle"></i>
            <h2>Complaint Submitted</h2>
            <p>Thank you. Your complaint has been logged and will be reviewed by the association. We may contact you on the number provided for follow-up.</p>
            <button onclick="resetForm()" class="btn-primary" style="margin-top:1.5rem;"><i class="fas fa-plus"></i> Submit Another</button>
        </div>
    </div>
    <p class="foot">L.O.T.A Public Complaints Portal</p>
</div>
<script>
document.getElementById('cDate').value = new Date().toISOString().split('T')[0];

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}
function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
}

async function submitComplaint() {
    hideError();
    const phone = document.getElementById('cPhone').value.trim();
    const description = document.getElementById('cDescription').value.trim();
    const type = document.getElementById('cType').value;
    const date = document.getElementById('cDate').value;

    if (!phone) { showError('Phone number is required so we can follow up with you.'); return; }
    if (!description) { showError('Please describe what happened.'); return; }
    if (!window.sb) { showError('Connection not ready, please try again in a moment.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

    const name = document.getElementById('cName').value.trim();
    const route = document.getElementById('cRoute').value.trim();
    const vehicle = document.getElementById('cVehicle').value.trim();

    let fullDescription = description;
    if (route) fullDescription += '\n\nRoute: ' + route;
    if (vehicle) fullDescription += '\nVehicle: ' + vehicle;

    const { error } = await window.sb.from('lota_incidents').insert([{
        incident_type: type,
        member_name: name || 'Public Complaint',
        complainant_phone: phone,
        incident_date: date,
        severity: 'medium',
        status: 'open',
        description: fullDescription
    }]);

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Complaint';

    if (error) {
        showError('Something went wrong submitting your complaint. Please try again.');
        return;
    }

    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
}

function resetForm() {
    document.getElementById('cName').value = '';
    document.getElementById('cPhone').value = '';
    document.getElementById('cType').value = 'driver_conduct';
    document.getElementById('cDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('cRoute').value = '';
    document.getElementById('cVehicle').value = '';
    document.getElementById('cDescription').value = '';
    document.getElementById('successView').style.display = 'none';
    document.getElementById('formView').style.display = 'block';
}
</script>
</body>
</html>
